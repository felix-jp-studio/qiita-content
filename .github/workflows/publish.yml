# Please set 'QIITA_TOKEN' secret to your repository
name: Publish articles

on:
  push:
    branches:
      - main
      - master
  workflow_run:
    workflows: ["Generate Qiita Article"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish_articles:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}

      - name: Detect target Qiita articles
        id: detect_targets
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target_basenames=""
            for file in public/*.md; do
              [ -f "$file" ] || continue
              id_value="$(awk -F': *' '/^id:/{print $2; exit}' "$file")"
              ignore_value="$(awk -F': *' '/^ignorePublish:/{print tolower($2); exit}' "$file")"

              if [ "$id_value" = "null" ] && [ "${ignore_value:-false}" = "false" ]; then
                basename="${file#public/}"
                basename="${basename%.md}"
                target_basenames="$target_basenames $basename"
              fi
            done
            target_basenames="$(echo "$target_basenames" | xargs)"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            target_files="$(git diff --name-only "${{ github.event.workflow_run.head_sha }}^" "${{ github.event.workflow_run.head_sha }}" -- 'public/*.md' || true)"
            target_basenames="$(echo "$target_files" | sed -E 's#^public/##; s#\.md$##' | tr '\n' ' ' | xargs)"
          else
            target_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'public/*.md' || true)"
            target_basenames="$(echo "$target_files" | sed -E 's#^public/##; s#\.md$##' | tr '\n' ' ' | xargs)"
          fi

          echo "target_basenames=$target_basenames" >> "$GITHUB_OUTPUT"
          if [ -z "$target_basenames" ]; then
            echo "No target Qiita articles found."
          else
            echo "Targets: $target_basenames"
          fi

      - name: Publish to Qiita (target articles only)
        if: steps.detect_targets.outputs.target_basenames != ''
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        shell: bash
        run: |
          npm install -g @qiita/qiita-cli@v1.8.0
          failed_basenames=""
          for basename in ${{ steps.detect_targets.outputs.target_basenames }}; do
            if qiita publish --root . "$basename"; then
              echo "Published: $basename"
            else
              echo "Publish failed: $basename"
              failed_basenames="$failed_basenames $basename"
            fi
          done

          git add public/*.md
          if ! git diff --staged --exit-code --quiet; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m "Updated by qiita-cli"
            git push origin HEAD:main
          fi

          if [ -n "$failed_basenames" ]; then
            echo "Failed basenames:$failed_basenames"
            exit 1
          fi

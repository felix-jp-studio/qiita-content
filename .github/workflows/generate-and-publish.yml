# 記事生成後に main へ直接 push。Qiita 公開は publish.yml（push トリガー）が担当。
name: Generate Qiita Article

on:
  schedule:
    - cron: "0 23 * * *" # 毎日 UTC 23:00 ≒ JST 翌日 08:00
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "同日の article が既にあっても上書き生成する"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: qiita-generate-article
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: JST date (コミットメッセージ用)
        id: jst
        run: echo "ymd=$(TZ=Asia/Tokyo date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Set FORCE_REGENERATE (workflow_dispatch + force のみ)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_regenerate }}" = "true" ]; then
            echo "FORCE_REGENERATE=1" >> "$GITHUB_ENV"
          else
            echo "FORCE_REGENERATE=" >> "$GITHUB_ENV"
          fi

      - name: Generate article with Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: node scripts/generate-article.js

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          if git diff --staged --quiet; then
            echo "Nothing to commit (skipped or unchanged)."
            exit 0
          fi
          git commit -m "auto: add article ${{ steps.jst.outputs.ymd }}"
          git pull --rebase origin main
          git push origin main
